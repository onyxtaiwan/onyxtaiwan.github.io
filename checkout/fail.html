<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Interrupted | ONYX Taiwan</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-gray-200 antialiased selection:bg-[#d4af37] selection:text-[#0f0f0f] min-h-screen flex flex-col">

    <nav class="w-full py-6 text-center absolute top-0">
        <a href="../index.html" class="inline-block">
            <span class="text-xl md:text-2xl font-bold text-white tracking-widest uppercase">
                ONYX <span class="text-[#d4af37]">TAIWAN</span>
            </span>
        </a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4 mt-12 md:mt-16">
        <div class="max-w-md w-full bg-gradient-to-br from-[#1a1a1a] to-[#0f0f0f] p-6 md:p-8 rounded-2xl border border-red-500/30 shadow-2xl shadow-red-500/5 text-center relative overflow-hidden">
            
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-red-500/50 to-transparent opacity-75"></div>

            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-red-500/10 mb-4 border border-red-500/20">
                <i data-lucide="alert-circle" class="w-7 h-7 text-red-400"></i>
            </div>

            <h1 class="text-xl font-bold text-white mb-2 tracking-widest uppercase">Payment Interrupted</h1>
            <div class="w-10 h-1 bg-red-500/50 mx-auto rounded-full mb-5"></div>
            
            <p class="text-gray-300 text-sm md:text-base leading-relaxed mb-5">
                The authorization process was not completed.<br class="hidden md:block">
                <strong class="text-white font-semibold">Don't worry, your reservation is still securely held.</strong>
            </p>
            
            <div class="bg-[#111] border border-white/10 rounded-xl p-4 mb-6 shadow-inner">
                <p class="text-[#d4af37] text-sm font-bold flex items-center justify-center gap-1.5 mb-1.5">
                    <i data-lucide="mail" class="w-4 h-4"></i> How to try again?
                </p>
                <p class="text-gray-400 text-xs md:text-sm leading-relaxed">
                    Please return to your <strong class="text-white font-medium">confirmation email</strong>. You can use the authorization button to try another card or payment method.
                </p>
            </div>

            <div class="space-y-3">
                <a href="https://wa.me/886970326591?text=Hi%20ONYX!%20My%20payment%20link%20failed.%20Can%20you%20help%20me%20confirm%20my%20booking%20and%20provide%20other%20payment%20options%3F" target="_blank" class="w-full flex items-center justify-center bg-[#25D366] hover:bg-[#1ebd5b] text-white py-3.5 rounded-xl font-bold transition-all transform hover:scale-105 shadow-lg shadow-[#25D366]/20 text-sm tracking-wide">
                    <i data-lucide="message-circle" class="mr-2 w-5 h-5"></i> GET HELP ON WHATSAPP
                </a>

                <button onclick="window.close();" class="w-full flex items-center justify-center bg-white/5 hover:bg-white/10 text-white py-3.5 rounded-xl font-bold transition-all border border-white/10 text-sm tracking-wide">
                    <i data-lucide="x-circle" class="mr-2 w-5 h-5 text-gray-400"></i> CLOSE PAGE
                </button>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
